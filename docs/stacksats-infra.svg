<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#555"/>
    </marker>
    <marker id="arrowg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#7a8aa0"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="900" fill="#ffffff"/>

  <!-- Title -->
  <text x="50" y="48" font-size="30" font-weight="700" fill="#1b2330">StackSats — System Infrastructure (AWS)</text>
  <text x="50" y="76" font-size="15" fill="#6b7585">Next.js 15 + Prisma + BullMQ · CloudFront → EC2 (Docker Compose) · region ap-southeast-7 (Bangkok)</text>

  <!-- Users -->
  <rect x="600" y="100" width="220" height="58" rx="10" fill="#eef2f8" stroke="#9aa7bd"/>
  <text x="710" y="135" font-size="17" font-weight="600" fill="#1b2330" text-anchor="middle">Users / Browser</text>

  <!-- arrow Users -> CloudFront -->
  <line x1="710" y1="158" x2="710" y2="196" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="722" y="182" font-size="13" fill="#6b7585">HTTPS</text>

  <!-- CloudFront -->
  <rect x="520" y="198" width="380" height="78" rx="10" fill="#efe6ff" stroke="#8C4FFF"/>
  <text x="710" y="228" font-size="18" font-weight="700" fill="#3d1d80" text-anchor="middle">Amazon CloudFront — HTTPS / CDN</text>
  <text x="710" y="254" font-size="14" fill="#5a4a85" text-anchor="middle" font-family="monospace">d1j7crkdurl59p.cloudfront.net</text>

  <!-- arrow CloudFront -> EC2 -->
  <line x1="710" y1="276" x2="710" y2="332" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="722" y="312" font-size="13" fill="#6b7585">HTTP (origin → :80)</text>

  <!-- Region container -->
  <rect x="60" y="334" width="960" height="392" rx="14" fill="#fff8ee" stroke="#FF9900" stroke-dasharray="7 5"/>
  <text x="84" y="362" font-size="15" font-weight="700" fill="#9a6200">AWS · ap-southeast-7 (Bangkok)</text>

  <!-- EC2 host -->
  <rect x="90" y="380" width="900" height="220" rx="12" fill="#ffffff" stroke="#FF9900"/>
  <text x="112" y="408" font-size="15" font-weight="700" fill="#9a6200">EC2  i-08ad7b6fde167774d  ·  t3.micro · Ubuntu  ·  Docker Compose</text>

  <!-- web container -->
  <rect x="120" y="430" width="380" height="150" rx="10" fill="#fff3e0" stroke="#FB8C00"/>
  <text x="310" y="462" font-size="17" font-weight="700" fill="#b35a00" text-anchor="middle">web — Next.js 15</text>
  <text x="310" y="488" font-size="14" fill="#7a5230" text-anchor="middle">port 80 → 3000</text>
  <text x="310" y="512" font-size="14" fill="#7a5230" text-anchor="middle">prisma migrate deploy (on start)</text>
  <text x="310" y="536" font-size="14" fill="#7a5230" text-anchor="middle">next start · API routes</text>
  <text x="310" y="562" font-size="13" fill="#a07a50" text-anchor="middle">healthcheck: /api/health</text>

  <!-- worker container -->
  <rect x="580" y="430" width="380" height="150" rx="10" fill="#fff3e0" stroke="#FB8C00"/>
  <text x="770" y="462" font-size="17" font-weight="700" fill="#b35a00" text-anchor="middle">worker — BullMQ</text>
  <text x="770" y="488" font-size="14" fill="#7a5230" text-anchor="middle">tsx lib/worker.ts</text>
  <text x="770" y="512" font-size="14" fill="#7a5230" text-anchor="middle">background jobs / queues</text>

  <!-- IAM role -->
  <rect x="90" y="630" width="900" height="64" rx="10" fill="#f3eefb" stroke="#8C4FFF"/>
  <text x="540" y="668" font-size="15" font-weight="600" fill="#3d1d80" text-anchor="middle">IAM instance role: stacksat-ec2-role  →  S3 access (no static keys)</text>

  <!-- Managed services band -->
  <text x="60" y="762" font-size="15" font-weight="700" fill="#37475e">Data &amp; storage (AWS managed)</text>

  <!-- RDS -->
  <rect x="60" y="776" width="290" height="96" rx="10" fill="#e7f0fb" stroke="#2E73B8"/>
  <text x="205" y="808" font-size="17" font-weight="700" fill="#1c4f80" text-anchor="middle">Amazon RDS</text>
  <text x="205" y="832" font-size="14" fill="#33597f" text-anchor="middle">PostgreSQL</text>
  <text x="205" y="854" font-size="12" fill="#5a7596" text-anchor="middle" font-family="monospace">DATABASE_URL</text>

  <!-- ElastiCache -->
  <rect x="370" y="776" width="290" height="96" rx="10" fill="#e7f0fb" stroke="#2E73B8"/>
  <text x="515" y="808" font-size="17" font-weight="700" fill="#1c4f80" text-anchor="middle">Amazon ElastiCache</text>
  <text x="515" y="832" font-size="14" fill="#33597f" text-anchor="middle">Redis · BullMQ backend</text>
  <text x="515" y="854" font-size="12" fill="#5a7596" text-anchor="middle" font-family="monospace">REDIS_URL</text>

  <!-- S3 -->
  <rect x="680" y="776" width="340" height="96" rx="10" fill="#e8f5e2" stroke="#3F8624"/>
  <text x="850" y="808" font-size="17" font-weight="700" fill="#2c5e18" text-anchor="middle">Amazon S3</text>
  <text x="850" y="832" font-size="14" fill="#3c6a26" text-anchor="middle">slip images (private)</text>
  <text x="850" y="854" font-size="12" fill="#5f8a4a" text-anchor="middle" font-family="monospace">stacksats-slips-th-…</text>

  <!-- External APIs container -->
  <rect x="1070" y="334" width="380" height="538" rx="14" fill="#f7f8fa" stroke="#9aa7bd" stroke-dasharray="7 5"/>
  <text x="1094" y="362" font-size="15" font-weight="700" fill="#37475e">External APIs (outbound HTTPS)</text>

  <rect x="1094" y="384" width="332" height="78" rx="9" fill="#ffffff" stroke="#c2ccda"/>
  <text x="1260" y="414" font-size="16" font-weight="700" fill="#1b2330" text-anchor="middle">Anthropic Claude</text>
  <text x="1260" y="438" font-size="13" fill="#6b7585" text-anchor="middle">slip OCR (fallback)</text>

  <rect x="1094" y="474" width="332" height="78" rx="9" fill="#ffffff" stroke="#c2ccda"/>
  <text x="1260" y="504" font-size="16" font-weight="700" fill="#1b2330" text-anchor="middle">Google Gemini</text>
  <text x="1260" y="528" font-size="13" fill="#6b7585" text-anchor="middle">slip OCR (primary)</text>

  <rect x="1094" y="564" width="332" height="78" rx="9" fill="#ffffff" stroke="#c2ccda"/>
  <text x="1260" y="594" font-size="16" font-weight="700" fill="#1b2330" text-anchor="middle">CoinGecko API</text>
  <text x="1260" y="618" font-size="13" fill="#6b7585" text-anchor="middle">BTC price (THB / USD)</text>

  <rect x="1094" y="654" width="332" height="78" rx="9" fill="#ffffff" stroke="#c2ccda"/>
  <text x="1260" y="684" font-size="16" font-weight="700" fill="#1b2330" text-anchor="middle">BTCPay Server</text>
  <text x="1260" y="708" font-size="13" fill="#6b7585" text-anchor="middle">Lightning subscriptions</text>

  <rect x="1094" y="744" width="332" height="78" rx="9" fill="#ffffff" stroke="#c2ccda"/>
  <text x="1260" y="774" font-size="16" font-weight="700" fill="#1b2330" text-anchor="middle">SMTP / Amazon SES</text>
  <text x="1260" y="798" font-size="13" fill="#6b7585" text-anchor="middle">email (password reset)</text>

  <!-- arrows EC2 -> data -->
  <line x1="250" y1="600" x2="205" y2="776" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="150" y="715" font-size="12" fill="#6b7585">SQL</text>

  <line x1="470" y1="600" x2="515" y2="776" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="525" y="715" font-size="12" fill="#6b7585">jobs / cache</text>

  <line x1="760" y1="600" x2="840" y2="776" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="812" y="715" font-size="12" fill="#6b7585">slip images</text>

  <!-- arrow EC2 -> external -->
  <line x1="990" y1="500" x2="1070" y2="500" stroke="#7a8aa0" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowg)"/>
  <text x="1000" y="490" font-size="12" fill="#7a8aa0">OCR · prices · email · Lightning</text>

  <!-- footer -->
  <text x="50" y="892" font-size="12" fill="#9aa7bd">Deploy: git pull master → docker compose --env-file .env.production up -d --build  ·  web runs prisma migrate deploy on start</text>
</svg>
