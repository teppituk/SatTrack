# Self-hosted deploy target: single EC2 instance running the WHOLE stack
# (web + worker + Postgres + Redis) via Docker Compose. No managed RDS/ElastiCache.
#
#   docker compose -f docker-compose.selfhost.yml --env-file .env.production up -d --build
#
# The web service applies pending Prisma migrations on start (idempotent),
# after Postgres reports healthy. Data persists in named volumes.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    image: stacksat:latest
    command: sh -c "npx prisma migrate deploy && npm run start"
    env_file: .env.production
    ports:
      - "80:3000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  worker:
    build: .
    image: stacksat:latest
    command: npm run worker
    env_file: .env.production
    restart: unless-stopped
    depends_on:
      - web
      - redis

volumes:
  pgdata:
  redisdata:
